<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apply — CommonArtist</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --accent: #D35147; --nav: #2F2F37; --gold: #f8c571; --border: #e0dbd6; --bg: #f5f3f0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg); color: #333; font-size: 15px; line-height: 1.5; padding: 24px 16px; }
.wrap { max-width: 560px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: var(--nav); }
.sub { color: #666; font-size: 14px; margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: #555; }
input, textarea, select { width: 100%; padding: 9px 12px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 14px; font-family: inherit; background: #fff; }
textarea { min-height: 100px; resize: vertical; }
input:focus, textarea:focus { outline: none; border-color: var(--accent); }
.btn { display: inline-block; padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 14px; font-weight: 500; }
.btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 8px; font-size: 15px; }
.success { background: #e6f4ea; border: 1px solid #a8d5b3; border-radius: 8px; padding: 20px;
  color: #1e5c2f; text-align: center; }
.error-box { background: #fdecea; border: 1px solid #f5c6c6; border-radius: 8px; padding: 12px 16px;
  color: #c0392b; font-size: 13px; margin-bottom: 16px; }
.required { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Artist Application</h1>
  <p class="sub">Tell us about yourself and your work. We review all applications and will be in touch.</p>

  {% if submitted %}
  <div class="success">
    <div style="font-size:28px;margin-bottom:8px;">Thanks!</div>
    <div>Your application has been received. We'll review it and follow up by email.</div>
  </div>
  {% else %}

  {% if error %}<div class="error-box">{{ error }}</div>{% endif %}

  <form method="post" action="/apply">
    <div class="form-group">
      <label>Name <span class="required">*</span></label>
      <input type="text" name="name" required placeholder="Your full name">
    </div>
    <div class="form-group">
      <label>Email <span class="required">*</span></label>
      <input type="email" name="email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" name="phone" placeholder="Optional">
    </div>
    <div class="form-group">
      <label>Media / Art Types <span class="required">*</span></label>
      <input type="text" name="media_types" required placeholder="e.g. ceramics, watercolor, jewelry">
    </div>
    <div class="form-group">
      <label>Portfolio or Website</label>
      <input type="url" name="portfolio_url" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Bio <span class="required">*</span></label>
      <textarea name="bio" required placeholder="Tell us about yourself and your background as an artist."></textarea>
    </div>
    <div class="form-group">
      <label>Artist Statement</label>
      <textarea name="artist_statement" placeholder="Describe your work and artistic practice."></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Submit Application</button>
  </form>
  {% endif %}
</div>
</body>
</html>
