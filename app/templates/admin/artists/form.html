{% extends "layout.html" %}
{% block title %}{{ 'Edit' if artist else 'New Artist' }}{% endblock %}
{% block topbar_title %}{{ 'Edit ' + artist.name if artist else 'New Artist' }}{% endblock %}

{% block content %}
<div class="card" style="max-width:640px;">
  <div class="card-body">
    <form method="post" action="{{ '/admin/artists/' + artist.id + '/edit' if artist else '/admin/artists/new' }}">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" name="name" value="{{ artist.name if artist else '' }}" required>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" name="email" value="{{ artist.email if artist else '' }}" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" value="{{ artist.phone if artist else '' }}">
        </div>
        <div class="form-group">
          <label>POS Vendor Name <span style="color:var(--label);font-weight:400;">(Shopify vendor field)</span></label>
          <input type="text" name="pos_vendor_name" value="{{ artist.pos_vendor_name if artist else '' }}" placeholder="e.g. Jane Smith Pottery">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Website</label>
          <input type="text" name="website" value="{{ artist.website if artist else '' }}">
        </div>
        <div class="form-group">
          <label>Instagram</label>
          <input type="text" name="instagram" value="{{ artist.instagram if artist else '' }}" placeholder="@handle">
        </div>
      </div>
      <div class="form-group">
        <label>Media Types</label>
        <input type="text" name="media_types" value="{{ artist.media_types if artist else '' }}" placeholder="e.g. Pottery, Jewelry, Textiles">
      </div>
      <div class="form-group">
        <label>Commission Rate Override <span style="color:var(--label);font-weight:400;">(leave blank for gallery default)</span></label>
        <input type="text" name="commission_rate_override" value="{{ artist.commission_rate_override if artist else '' }}" placeholder="e.g. 0.20">
      </div>
      <div class="form-group">
        <label>Bio</label>
        <textarea name="bio">{{ artist.bio if artist else '' }}</textarea>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" name="w9_on_file" value="1" {% if artist and artist.w9_on_file %}checked{% endif %}>
          W-9 on file
        </label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ 'Save Changes' if artist else 'Create Artist' }}</button>
        <a href="{{ '/admin/artists/' + artist.id if artist else '/admin/artists' }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
