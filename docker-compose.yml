version: "3.9"

services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: commonartist
      POSTGRES_PASSWORD: commonartist
      POSTGRES_DB: commonartist
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commonartist"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
